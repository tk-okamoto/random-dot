<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ランダムドット</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a0f; overflow: hidden; }
    canvas { display: block; }
    #info {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.3);
      font-family: sans-serif;
      font-size: 13px;
      pointer-events: none;
    }
  </style>
</head>
<body>
<canvas id="c"></canvas>

<script>
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  let W, H;
  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  const dot = {
    x: 0, y: 0,
    vx: 0, vy: 0,
    r: 16,
  };

  // ランダムな速度で発射
  function randomVelocity() {
    const speed = Math.random() * 4 + 4; // 4〜8
    const angle = Math.random() * Math.PI * 2;
    dot.vx = Math.cos(angle) * speed;
    dot.vy = Math.sin(angle) * speed;
  }

  // 画面中央からスタート
  dot.x = W / 2;
  dot.y = H / 2;
  randomVelocity();

  function update() {
    dot.x += dot.vx;
    dot.y += dot.vy;

    // 壁に当たったら反射 + ランダムな速度に変化
    let hit = false;
    if (dot.x < dot.r)        { dot.x = dot.r;        dot.vx = Math.abs(dot.vx);  hit = true; }
    if (dot.x > W - dot.r)    { dot.x = W - dot.r;    dot.vx = -Math.abs(dot.vx); hit = true; }
    if (dot.y < dot.r)        { dot.y = dot.r;         dot.vy = Math.abs(dot.vy);  hit = true; }
    if (dot.y > H - dot.r)    { dot.y = H - dot.r;     dot.vy = -Math.abs(dot.vy); hit = true; }

    if (hit) {
      const speed = Math.random() * 4 + 4;
      // 現在の反射角からランダムにずらす（±60度以内）
      const currentAngle = Math.atan2(dot.vy, dot.vx);
      const randomOffset = (Math.random() - 0.5) * (Math.PI * 2 / 3);
      const newAngle = currentAngle + randomOffset;
      dot.vx = Math.cos(newAngle) * speed;
      dot.vy = Math.sin(newAngle) * speed;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    ctx.beginPath();
    ctx.arc(dot.x, dot.y, dot.r, 0, Math.PI * 2);
    ctx.fillStyle = '#ff0000';
    ctx.fill();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }
  loop();
</script>
</body>
</html>
